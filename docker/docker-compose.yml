version: "3.8"

services:
  php:
    build:
      context: .
      dockerfile: PhpFpm.Dockerfile
    container_name: php-fpm_UTN
    volumes:
      - ../aplicacion-web:/var/www/html
    environment:
      - TZ=America/Argentina/Buenos_Aires

  nginx:
    image: nginx:1.24
    container_name: nginx_UTN
    ports:
      - "80:80"
    volumes:
      - ./configNginx/default.conf:/etc/nginx/conf.d/default.conf
      - ../aplicacion-web:/var/www/html
    depends_on:
      - php
      - db

  db:
    image: mysql:8.4.2
    container_name: db_UTN
    environment:
      MYSQL_ROOT_PASSWORD: abcde1234
      MYSQL_DATABASE: datos
      MYSQL_USER: usuario
      MYSQL_PASSWORD: abcde5678
      TZ: America/Argentina/Buenos_Aires
    volumes:
      - ../bDContenedor:/var/lib/mysql
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_UTN
    environment:
      PMA_HOST: db_UTN
      PMA_USER: usuario
      PMA_PASSWORD: abcde5678
    ports:
      - "8080:80"
    depends_on:
      - db
